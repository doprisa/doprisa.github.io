# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: NullDeltaQ
first_name: Danny
last_name:
description: The null space of the Dirichlet energy — where harmonic solutions live

url: https://doprisa.github.io
baseurl: ""

icon: ⚛️

github_username: doprisa
linkedin_username: danoprisa

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: false
socials_in_search: false
posts_in_search: false
bib_search: true

max_width: 930px

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: NullDeltaQ
blog_description: Physics-grounded AI
permalink: /blog/:year/:title/

pagination:
  enabled: true

related_blog_posts:
  enabled: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - package.json
  - package-lock.json
  - _pages/about_einstein.md
  - README.md
  - vendor

keep_files:
  - CNAME
  - .nojekyll

plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-tabs
  - jekyll-toc

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [your_last_name]
  first_name: [Danny]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: false
  dimensions: true
  google_scholar: false
  inspirehep: false

enable_publication_thumbnails: false

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_analytics: false
enable_math: true
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: false
enable_medium_zoom: true
enable_masonry: true
enable_progressbar: true

# -----------------------------------------------------------------------------
# Libraries
# -----------------------------------------------------------------------------

third_party_libraries:
  download: false
